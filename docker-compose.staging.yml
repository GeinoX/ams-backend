version: "3.9"

services:

  db:
    image: postgres:17
    restart: always
    env_file:
      - .env.staging
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"

  web:
    image: ${DOCKER_HUB_USERNAME}/ams-backend:staging
    restart: always
    env_file:
      - .env.staging
    depends_on:
      - db
      - redis
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"

  celery:
    image: ${DOCKER_HUB_USERNAME}/ams-backend:staging
    command: celery -A umsproj worker -l info
    restart: always
    env_file:
      - .env.staging
    depends_on:
      - db
      - redis

  celery-beat:
    image: ${DOCKER_HUB_USERNAME}/ams-backend:staging
    command: celery -A umsproj beat -l info
    restart: always
    env_file:
      - .env.staging
    depends_on:
      - db
      - redis

  redis:
    image: redis:7-alpine
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  pgdata:
  static_volume:
  media_volume:
  certbot_www:
  certbot_conf: