name: AMS Deploy to Production

on:
  push:
    branches:
      - main

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          cd ams-proj
          pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: "test-secret-key-not-real"
          DEBUG: "True"
          DJANGO_SETTINGS_MODULE: umsproj.settings_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          EMAIL_HOST_USER: test@test.com
          EMAIL_HOST_PASSWORD: testpassword
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
        run: |
          cd ams-proj
          python manage.py test --verbosity=2

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ams-backend:production
            ${{ secrets.DOCKER_HUB_USERNAME }}/ams-backend:${{ github.sha }}

  deploy:
    name: Deploy to Contabo
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CELERY_BROKER_URL: ${{ secrets.CELERY_BROKER_URL }}
          CELERY_RESULT_BACKEND: ${{ secrets.CELERY_RESULT_BACKEND }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GRAFANA_USER: ${{ secrets.GRAFANA_USER }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          password: ${{ secrets.PROD_SERVER_PASSWORD }}
          envs: SECRET_KEY,DOCKER_HUB_USERNAME,DB_NAME,DB_USER,DB_PASSWORD,DB_HOST,DB_PORT,DATABASE_URL,REDIS_URL,CELERY_BROKER_URL,CELERY_RESULT_BACKEND,EMAIL_HOST,EMAIL_PORT,EMAIL_USE_TLS,EMAIL_HOST_USER,EMAIL_HOST_PASSWORD,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,SENTRY_DSN,GRAFANA_USER,GRAFANA_PASSWORD
          script: |
            mkdir -p /opt/ams

            cat > /opt/ams/.env << EOF
            SECRET_KEY=${SECRET_KEY}
            DEBUG=False
            ALLOWED_HOSTS=api.oracleofgenz.com,web
            ENV=production

            DOCKER_HUB_USERNAME=${DOCKER_HUB_USERNAME}

            DB_NAME=${DB_NAME}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            DB_HOST=${DB_HOST}
            DB_PORT=${DB_PORT}
            DATABASE_URL=${DATABASE_URL}

            REDIS_URL=${REDIS_URL}
            CELERY_BROKER_URL=${CELERY_BROKER_URL}
            CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}

            EMAIL_HOST=${EMAIL_HOST}
            EMAIL_PORT=${EMAIL_PORT}
            EMAIL_USE_TLS=${EMAIL_USE_TLS}
            EMAIL_HOST_USER=${EMAIL_HOST_USER}
            EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}

            CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
            CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
            CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}

            SENTRY_DSN=${SENTRY_DSN}

            GRAFANA_USER=${GRAFANA_USER}
            GRAFANA_PASSWORD=${GRAFANA_PASSWORD}
            EOF

            cd /opt/ams
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate
            docker compose -f docker-compose.prod.yml exec -T -u root web python manage.py collectstatic --noinput
            docker compose -f docker-compose.prod.yml exec -T -u root web chown -R django:django /app/staticfiles
            docker image prune -f